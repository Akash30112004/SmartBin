version: '3.8'

services:
  frontend:
    build: .
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_WS_URL=http://localhost:8080/ws
    depends_on:
      - backend

  backend:
    image: your-backend-image:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
